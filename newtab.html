<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="icon.png">
</head>

<body>
  <div class="wallpaper-layer"></div>
  <div class="wallpaper-overlay"></div>

  <main class="app-shell">
    <div class="app-container">
      <div class="main-content">
        <div class="hero-copy">
          <p class="hero-label" id="greetingText">Welcome</p>
          <h2 id="clock">00:00</h2>
          <p class="hero-sub" id="dateText">Loading date...</p>
        </div>

        <section class="search-section">
          <form id="searchForm" class="search-engine" role="search">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.6-3.6"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="Search" autocomplete="off" />
          </form>

          <button id="openLensModal" class="browse-btn icon-only" type="button" aria-label="Search by image">
            <img alt="" width="20" height="20"
              src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none'%3E%3Crect x='3' y='5' width='18' height='14' rx='3' stroke='white' stroke-opacity='.9' stroke-width='2'/%3E%3Cpath d='M7 14l2-2 3 3 3-4 3 3' stroke='white' stroke-opacity='.9' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='9' cy='9' r='1.5' fill='white' fill-opacity='.9'/%3E%3C/svg%3E" />
            <span class="hover-label">Search by image</span>
          </button>
        </section>

        <section class="shortcut-section">
          <div class="section-head">
            <p>Shortcuts</p>
          </div>

          <div id="shortcutGrid" class="shortcut-grid"></div>
        </section>
      </div>

      <div class="side-content">
        <div class="hero-media">
          <label class="hero-image-shell" for="heroImageInput" id="heroImageContainer">
            <img id="heroImage" alt="Hero" />
            <div class="hero-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              <span>Change Image</span>
            </div>
          </label>
          <input id="heroImageInput" type="file" accept="image/*" hidden>
        </div>
      </div>
    </div>

    <div class="bottom-left-actions">
      <a href="https://github.com/Rzki-Lil" target="_blank" class="typing-link">github.com/Rzki-Lil</a>
    </div>

    <div class="bottom-right-actions">
      <label class="wallpaper-btn" for="wallpaperInput">Wallpaper</label>
      <input id="wallpaperInput" type="file" accept="image/*" hidden>
    </div>
  </main>

  <div id="shortcutModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <div class="modal-card glass" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle">Add shortcut</h3>
        <button id="closeModalBtn" class="icon-btn" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"></path>
          </svg>
        </button>
      </div>

      <form id="shortcutForm" class="shortcut-form">
        <div class="field">
          <label for="shortcutUrl">URL</label>
          <input id="shortcutUrl" type="text" placeholder="github.com" required />
        </div>

        <button class="primary-btn full" type="submit">Save</button>
      </form>
    </div>
  </div>

  <div id="lensModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="lensBackdrop"></div>

    <div class="modal-card glass" role="dialog" aria-modal="true" aria-labelledby="lensTitle">
      <div class="modal-head">
        <h3 id="lensTitle">Search by image</h3>
        <button id="closeLensBtn" class="icon-btn" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"></path>
          </svg>
        </button>
      </div>

      <div id="lensDropzone" class="dropzone">
        <div class="drop-visual">
          <img alt="" width="64" height="64"
            src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64' fill='none'%3E%3Crect x='4' y='8' width='56' height='40' rx='10' stroke='white' stroke-opacity='.5' stroke-width='3'/%3E%3Cpath d='M16 40l8-8 12 12 12-16 12 12' stroke='white' stroke-opacity='.8' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='22' cy='22' r='4' fill='white' fill-opacity='.7'/%3E%3C/svg%3E" />
        </div>

        <p>Drag an image here or upload a file</p>

        <form id="lensUploadForm" class="lens-upload" action="https://www.google.com/searchbyimage/upload" method="POST"
          enctype="multipart/form-data">
          <button id="lensUploadBtn" class="primary-btn" type="button">Upload file</button>
          <input id="lensPicker" name="encoded_image" type="file" accept="image/*" hidden />
        </form>
      </div>

      <div class="lens-divider">
        <span>OR</span>
      </div>

      <form id="lensUrlForm" class="lens-url" autocomplete="off">
        <input id="lensUrlInput" type="url" placeholder="Paste image link" />
        <button class="primary-btn" type="submit">Search</button>
      </form>
    </div>
  </div>

  <div id="cropModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="cropBackdrop"></div>
    <div class="modal-card glass" role="dialog" style="width: 800px; max-width: 90vw; padding: 0; overflow: hidden;">
      <div class="modal-head" style="padding: 20px;">
        <h3>Set Wallpaper</h3>
        <button id="closeCropBtn" class="icon-btn" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" stroke="white" stroke-width="2"
            stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18"></path>
          </svg>
        </button>
      </div>
      <div class="crop-body" style="padding: 0 20px 20px;">
        <div id="cropArea"
          style="width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; position: relative; border-radius: 8px; cursor: grab; user-select: none;">
          <img id="cropImage" src="" style="position: absolute; transform-origin: 0 0;" draggable="false" />
        </div>
        <div style="margin-top: 16px; display: flex; align-items: center; gap: 12px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.7;">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
          </svg>
          <input type="range" id="cropZoom" min="0.1" max="5" step="0.01" value="1" style="flex: 1;" />
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.7;">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
          </svg>
        </div>
        <button id="saveCropBtn" class="primary-btn full" style="margin-top: 16px;">Apply Wallpaper</button>
      </div>
    </div>
  </div>

  <template id="shortcutItemTemplate">
    <a class="shortcut-icon-wrap" target="_self" rel="noreferrer" draggable="true">
      <img class="shortcut-icon" alt="" width="28" height="28" loading="lazy" />
    </a>
  </template>

  <div id="shortcutContextMenu" class="context-menu hidden"
    style="position: absolute; z-index: 9999; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 4px; display: flex; flex-direction: column; transition: opacity 0.2s ease, transform 0.2s ease;">
    <button id="editShortcutCmd" class="primary-btn"
      style="background: transparent; color: white; text-align: left; padding: 8px 12px; margin: 2px; border:none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s;">Edit</button>
    <button id="deleteShortcutCmd" class="primary-btn"
      style="background: transparent; color: #ff4d4d; text-align: left; padding: 8px 12px; margin: 2px; border:none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s;">Delete</button>
  </div>
  <style>
    .context-menu {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .context-menu.hidden {
      display: flex !important;
      /* Override the default .hidden display:none to allow transitions, visibility is handled by opacity */
      opacity: 0;
      transform: translateX(-50%) translateY(-10px) !important;
      pointer-events: none;
    }

    .context-menu button:hover {
      background: rgba(255, 255, 255, 0.2) !important;
    }
  </style>

  <script src="newtab.js"></script>
</body>

</html>
